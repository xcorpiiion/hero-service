name: CI - Validação de Projeto Spring Boot

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  pipeline-qualidade:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # Necessário para o Qodana anotar o código

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Importante para o Qodana analisar o histórico

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Cache turbina o tempo de build

      # --- ETAPA 1: COMPILAÇÃO E TESTES ---
      - name: Build and Test
        run: |
          echo "::group::🔨 Compilando e Rodando Testes"
          mvn clean verify
          echo "::notice::Build e Testes finalizados com sucesso!"
          echo "::endgroup::"

      # --- ETAPA 2: QUALITY GATE (O SEU FILTRO) ---
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2025.3
        with:
          args: --image,jetbrains/qodana-jvm:latest

        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_649500073 }}

      # --- ETAPA 3: NOTIFICAÇÃO (OPCIONAL) ---
      - name: Status do Build
        if: success()
        run: echo "::notice::O código está 100% aprovado para rodar local!"