name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'releases/*'

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4 # Atualizei para v4 que é mais estável
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2025.3
        with:
          args: --image,jetbrains/qodana-jvm:2025.3
          # 0 = Tolerância Zero. Se houver 1 erro crítico/vulnerabilidade, o build morre.
          pr-mode: false
        env:
          # Usei o nome do seu novo secret conforme você alterou
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_649500073 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'